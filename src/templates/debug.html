<div id="uie-debug-window" class="uie-window" style="display:none;">
    <div class="uie-header" style="border-color:#00f0ff;">
        <span style="color:#00f0ff; font-weight:bold;">SYSTEM DIAGNOSTICS</span>
        <i class="fa-solid fa-xmark uie-close-btn" id="uie-debug-close" style="color:#00f0ff;"></i>
    </div>
    <div id="uie-debug-log" class="custom-scroll">Click RUN SCAN...</div>
    <div style="padding:10px; background:#161b22; border-top:1px solid #30363d;">
        <button id="uie-run-diag" style="width:100%; padding:10px; background:#00f0ff; color:#000; font-weight:bold; border:none; border-radius:4px;">RUN SCAN</button>
    </div>
</div>
