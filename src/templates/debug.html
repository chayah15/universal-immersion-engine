<div id="uie-debug-window" class="uie-window" style="display:none;">
    <div class="uie-header" style="border-color:#00f0ff;">
        <span style="color:#00f0ff; font-weight:bold;">SYSTEM DIAGNOSTICS</span>
        <i class="fa-solid fa-xmark uie-close-btn" id="uie-debug-close"></i>
    </div>
    <div id="uie-debug-log" class="custom-scroll">Initializing...</div>
    <div style="padding:10px; background:#161b22; border-top:1px solid #30363d; display:flex; gap:5px;">
        <button class="uie-debug-btn" id="uie-run-diag" style="flex:1;">RUN SCAN</button>
        <button class="uie-debug-btn" id="uie-save-report" style="flex:1; border-color:#2ea043; color:#2ea043;">SAVE</button>
    </div>
</div>
