<div id="uie-inventory-modal" class="uie-window" style="display:none;">
    <div class="uie-header uie-inv-header">
        <div class="uie-inv-avatar"></div>
        <div class="uie-inv-info">
            <h2 id="uie-char-name">Player</h2>
            <div class="uie-inv-meta">
                <span id="uie-char-class">Sanguine Shinobi</span>
                <span class="uie-gold"><i class="fa-solid fa-coins"></i> <span id="val-currency">0</span> GP</span>
            </div>
        </div>
        <div id="uie-fab-sparkle" class="uie-sparkle-btn" style="cursor:pointer; margin-right:10px;"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <i class="fa-solid fa-xmark uie-close-btn" id="uie-inv-close"></i>
    </div>

    <div class="uie-vitals-container">
        <div class="uie-shield-badge" id="uie-shield-badge"><i class="fa-solid fa-shield-halved"></i> <span id="val-shield">0</span></div>
        <div class="uie-vital-row"><div class="uie-vital-top"><span>HP</span><span id="txt-hp">100/100</span></div><div class="uie-bar-track"><div class="uie-bar-fill hp" id="bar-hp" style="width:100%"></div></div></div>
        <div class="uie-vital-row"><div class="uie-vital-top"><span>MP</span><span id="txt-mp">50/50</span></div><div class="uie-bar-track"><div class="uie-bar-fill mp" id="bar-mp" style="width:100%"></div></div></div>
        <div class="uie-vital-row"><div class="uie-vital-top"><span>AP</span><span id="txt-ap">10/10</span></div><div class="uie-bar-track"><div class="uie-bar-fill ap" id="bar-ap" style="width:100%"></div></div></div>
    </div>

    <div class="uie-stats-grid">
        <div class="uie-stat-box"><span class="lbl">STR</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">DEX</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">CON</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">INT</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">WIS</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">CHA</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">LUK</span><span class="val">10</span></div>
        <div class="uie-stat-box"><span class="lbl">PER</span><span class="val">10</span></div>
    </div>

    <div class="uie-inv-tabs">
        <div class="uie-tab active" data-tab="items">ITEMS</div>
        <div class="uie-tab" data-tab="equip">EQUIP</div>
        <div class="uie-tab" data-tab="skills">SKILLS</div>
        <div class="uie-tab" data-tab="assets">ASSETS</div>
    </div>

    <div class="uie-inv-content">
        <div id="uie-view-items" class="uie-grid-view"></div>
        <div id="uie-view-equip" style="display:none; text-align:center;">Equipment Slots</div>
    </div>
    
    <div id="uie-gen-modal" style="display:none;">
        <div class="uie-gen-header"><span>✨ Creative Engine</span><i class="fa-solid fa-xmark" id="uie-gen-close" style="float:right; cursor:pointer;"></i></div>
        <div class="uie-gen-content">
            <button class="uie-gen-btn" id="uie-gen-scan">👁️ Scan Chat</button>
            <button class="uie-gen-btn" id="uie-gen-item">⚔️ Generate Item</button>
        </div>
    </div>
</div>
